<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greed Route — สนทนา</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="community-discuss">

<main class="container">
  <div class="page-layout no-left">
    <div class="main-content">
      <div class="section-header">
        <h2 data-th="💬 สนทนา" data-en="💬 Discussions">💬 สนทนา</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" data-th="กลุ่ม" data-en="Groups">กลุ่ม</button>
          <button class="btn btn-secondary btn-sm" data-th="หนังสือ" data-en="Books">หนังสือ</button>
        </div>
      </div>
      <div id="discussionsList"></div>
      <div class="pagination" style="margin-top:20px">
        <button>«</button><button class="active">1</button><button>2</button><button>3</button><button>»</button>
      </div>
    </div>
    <aside class="sidebar">
      <h3 data-th="📖 หนังสือที่กำลังพูดถึง" data-en="📖 Books Being Discussed">📖 หนังสือที่กำลังพูดถึง</h3>
      <div style="display:flex;gap:8px;margin-top:8px">
        <div class="ph-cover placeholder-img" style="width:60px;height:90px;border-radius:6px;flex-shrink:0">📕</div>
        <div><div style="font-size:.85rem;font-weight:600">Atomic Habits</div><div style="font-size:.75rem;color:var(--text-secondary)">James Clear</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <div class="ph-cover placeholder-img" style="width:60px;height:90px;border-radius:6px;flex-shrink:0">📕</div>
        <div><div style="font-size:.85rem;font-weight:600">Dune</div><div style="font-size:.75rem;color:var(--text-secondary)">Frank Herbert</div></div>
      </div>
      <hr style="margin:16px 0;border:none;border-top:1px solid var(--border)">
      <h3 data-th="🏷️ แท็กยอดนิยม" data-en="🏷️ Popular Tags">🏷️ แท็กยอดนิยม</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
        <span class="btn btn-secondary btn-sm">จิตวิทยา</span>
        <span class="btn btn-secondary btn-sm">นิยาย</span>
        <span class="btn btn-secondary btn-sm">ธุรกิจ</span>
        <span class="btn btn-secondary btn-sm">แฟนตาซี</span>
      </div>
    </aside>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
window.onDataReady = function() {
  initComponents();
  populateGenreModal();
  const dList = document.getElementById('discussionsList');
  if (!dList) return;
  const discussionData = [
    {title_th:'ทำไม Atomic Habits ถึงเปลี่ยนชีวิตคนได้?', title_en:'Why Can Atomic Habits Change Lives?', group:'Self-Help Lovers', replies:45, date:'วันนี้'},
    {title_th:'หนังสือแฟนตาซีเรื่องไหนที่ดีที่สุดตลอดกาล?', title_en:'What Is the Best Fantasy Book of All Time?', group:'Fantasy Readers TH', replies:128, date:'เมื่อวาน'},
    {title_th:'แนะนำนิยายไทยที่ควรอ่านก่อนตาย', title_en:'Must-Read Thai Novels Before You Die', group:'Thai Literature', replies:67, date:'2 วันที่แล้ว'},
    {title_th:'Clean Code vs The Pragmatic Programmer?', title_en:'Clean Code vs The Pragmatic Programmer?', group:'Dev Bookworms', replies:34, date:'3 วันที่แล้ว'},
    {title_th:'ใครอ่าน Dune จบแล้วบ้าง? มาพูดคุยกัน!', title_en:'Who Finished Dune? Let\'s Discuss!', group:'Sci-Fi Thailand', replies:89, date:'4 วันที่แล้ว'}
  ];
  dList.innerHTML = discussionData.map(d => `<div class="discussion-card">
    <h4>${t(d,'title')}</h4>
    <div class="discussion-meta">👥 ${d.group} · 💬 ${d.replies} ${lang==='th'?'ตอบกลับ':'replies'} · ${d.date}</div>
  </div>`).join('');
};
</script>
</body>
</html>
