<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greed Route — สำรวจเพิ่มเติม</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="browse-explore">

<main class="container">
  <div class="page-layout no-left">
    <div class="main-content">
      <div class="section-header">
        <h2 data-th="🔭 สำรวจเพิ่มเติม" data-en="🔭 Explore">🔭 สำรวจเพิ่มเติม</h2>
      </div>
      <div id="exploreGrid"></div>
    </div>
    <aside class="sidebar">
      <h3 data-th="⚡ ลิงก์ด่วน" data-en="⚡ Quick Links">⚡ ลิงก์ด่วน</h3>
      <ul class="sidebar-nav">
        <li><a href="#" data-th="สร้างรายการใหม่" data-en="Create New List">📝 สร้างรายการใหม่</a></li>
        <li><a href="#" data-th="รายการที่ฉันสร้าง" data-en="Lists I Created">📋 รายการที่ฉันสร้าง</a></li>
        <li><a href="#" data-th="รายการที่โหวต" data-en="Lists I Voted On">🗳️ รายการที่โหวต</a></li>
      </ul>
    </aside>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
window.onDataReady = function() {
  initComponents();
  populateGenreModal();
  const exploreGrid = document.getElementById('exploreGrid');
  if (!exploreGrid || !books.length) return;
  const shuffled = [...books].sort(() => Math.random()-0.5);
  exploreGrid.innerHTML =
    `<div class="section-block"><h3 style="margin-bottom:12px">${lang==='th'?'🎲 สุ่มหนังสือสำหรับคุณ':'🎲 Random Picks for You'}</h3><div class="book-grid">${shuffled.slice(0,5).map(bookCardHTML).join('')}</div></div>` +
    `<div class="section-block"><h3 style="margin-bottom:12px">${lang==='th'?'📈 กำลังเป็นที่นิยม':'📈 Trending Now'}</h3><div class="book-grid">${shuffled.slice(5,10).map(bookCardHTML).join('')}</div></div>`;
};
</script>
</body>
</html>
