    background: #0f1117;

    overflow: hidden;

  #controls {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; gap: 10px; align-items: center;
    background: rgba(20,22,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 8px 18px; font-size: 13px;
  }
  #controls button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);

  }
  #controls button:hover { background: rgba(255,125,41,0.25); color: #FF7D29; }
  #title-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);

    background: rgba(20,22,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;

  }
  #title-bar h3 { font-size: 14px; font-weight: 600; color: #FF7D29; }
  #title-bar p { font-size: 11px; color: #888; margin-top: 2px; }

  svg { width: 100%; height: 100%; }

  .link {
    fill: none;
    stroke-width: 2;
    opacity: 0.5;
  }

  .node-group { cursor: pointer; }
  .node-group:hover .node-circle { filter: brightness(1.3) drop-shadow(0 0 8px rgba(255,125,41,0.4)); }

  .node-label {
    font-family: 'Inter', sans-serif;
    fill: #e0e0e0;
    pointer-events: none;
  }

  .tooltip {
    position: fixed;
    background: rgba(20,22,30,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,125,41,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    line-height: 1.5;
    color: #ccc;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
    z-index: 200;
  }
  .tooltip .tt-title { font-weight: 700; color: #FF7D29; margin-bottom: 4px; font-size: 13px; }

  .legend {
    position: fixed; bottom: 60px; right: 16px; z-index: 100;
    background: rgba(20,22,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 14px 18px; font-size: 11px;
  }
  .legend-title { font-weight: 700; color: #FF7D29; margin-bottom: 8px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>

// ─── D3-like force layout (vanilla JS) ─────────────────────────────
const svg = document.getElementById("svg");
const tooltip = document.getElementById("tooltip");
const W = window.innerWidth, H = window.innerHeight;
let zoom = 1, panX = 0, panY = 0;
let showLabels = true;

// Flatten tree into nodes & links
let nodeId = 0;
const nodes = [], links = [];
function flatten(d, parent, depth) {
  d.id = nodeId++;
  d.depth = depth;
  d.parent = parent;
  d._children = d.children || null;
  d.collapsed = depth > 2;
  nodes.push(d);
  if (parent !== null) links.push({ source: parent, target: d.id });
  if (d.children && !d.collapsed) {
    d.children.forEach(c => flatten(c, d.id, depth + 1));
  } else if (d._children && d.collapsed) {
    // keep _children reference but don't flatten
  }
}

// Rebuild the flat arrays
function rebuild() {
  nodes.length = 0; links.length = 0; nodeId = 0;
  flattenVisible(data, null, 0);
}
function flattenVisible(d, parent, depth) {
  d.id = nodeId++;
  d.depth = depth;
  d.parent = parent;
  nodes.push(d);
  if (parent !== null) links.push({ source: parent, target: d.id });
  if (d._children && !d.collapsed) {
    d._children.forEach(c => flattenVisible(c, d.id, depth + 1));
  }
}

// Layout: radial tree
function computeLayout() {
  const root = nodes[0];
  root.x = W / 2; root.y = H / 2;
  layoutChildren(root, 0, Math.PI * 2, 0);
}

function layoutChildren(node, startAngle, sweep, depth) {
  const children = getVisibleChildren(node);
  if (!children || children.length === 0) return;

  const radius = depth === 0 ? 200 : (depth === 1 ? 160 : (depth === 2 ? 120 : 90));
  const padding = 0.04;
  const totalPadding = padding * (children.length - 1);
  const availableSweep = sweep - totalPadding;
  const anglePerChild = availableSweep / children.length;

  children.forEach((child, i) => {
    const angle = startAngle + i * (anglePerChild + padding) + anglePerChild / 2;
    child.x = node.x + Math.cos(angle) * radius;
    child.y = node.y + Math.sin(angle) * radius;
    child.angle = angle;
    const childSweep = anglePerChild;
    layoutChildren(child, angle - childSweep / 2, childSweep, depth + 1);
  });
}

function getVisibleChildren(node) {
  if (node.collapsed || !node._children) return [];
  return node._children.map(c => nodes.find(n => n.name === c.name && n.parent === node.id)).filter(Boolean);
}

// ─── Rendering ─────────────────────────────────────────────────────
function render() {
  rebuild();
  computeLayout();

  let html = `<g transform="translate(${panX},${panY}) scale(${zoom})">`;

  // Links
  links.forEach(l => {
    const s = nodes[l.source], t = nodes[l.target];
    if (!s || !t) return;
    const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
    // Curved path
    const dx = t.x - s.x, dy = t.y - s.y;
    const cx = s.x + dx * 0.5 - dy * 0.15;
    const cy = s.y + dy * 0.5 + dx * 0.15;
    html += `<path class="link" d="M${s.x},${s.y} Q${cx},${cy} ${t.x},${t.y}" stroke="${t.color || '#555'}" />`;
  });

  // Nodes
  nodes.forEach(n => {
    const r = n.depth === 0 ? 40 : (n.depth === 1 ? 24 : (n.depth === 2 ? 16 : 11));
    const hasChildren = n._children && n._children.length > 0;
    const isCollapsed = n.collapsed && hasChildren;
    const strokeW = n.depth === 0 ? 3 : 2;
    const fill = n.depth === 0 ? n.color : (isCollapsed ? n.color : 'rgba(15,17,23,0.9)');
    const stroke = n.color || '#555';
    const badge = isCollapsed ? `<circle cx="${n.x + r * 0.7}" cy="${n.y - r * 0.7}" r="7" fill="#FF7D29" stroke="#0f1117" stroke-width="1.5"/>
      <text x="${n.x + r * 0.7}" y="${n.y - r * 0.7 + 3.5}" text-anchor="middle" fill="#0f1117" font-size="8" font-weight="700">${n._children.length}</text>` : '';

    html += `<g class="node-group" data-id="${n.id}" onmouseenter="showTip(event,${n.id})" onmouseleave="hideTip()" onclick="toggleNode(${n.id})">
      <circle class="node-circle" cx="${n.x}" cy="${n.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/>
      ${badge}`;

    if (showLabels) {
      const fontSize = n.depth === 0 ? 13 : (n.depth === 1 ? 11.5 : (n.depth === 2 ? 10.5 : 9.5));
      const labelLines = n.name.split('\n');
      const ly = n.y + r + 14;
      labelLines.forEach((line, li) => {
        html += `<text class="node-label" x="${n.x}" y="${ly + li * (fontSize + 2)}" text-anchor="middle" font-size="${fontSize}" font-weight="${n.depth <= 1 ? '700' : '500'}" fill="${n.depth === 0 ? '#FF7D29' : '#ddd'}">${escHtml(line)}</text>`;
      });
    }

    html += `</g>`;
  });

  html += `</g>`;
  svg.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Interaction ──────────────────────────────────────────────────
function toggleNode(id) {
  const node = nodes.find(n => n.id === id);
  if (!node || !node._children || node._children.length === 0) return;
  node.collapsed = !node.collapsed;
  // propagate collapse to children
  if (node.collapsed) {
    collapseDescendants(node);
  }
  render();
}

function collapseDescendants(node) {
  if (!node._children) return;
  node._children.forEach(c => { c.collapsed = true; collapseDescendants(c); });
}

function showTip(e, id) {
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  const name = node.name.replace(/\n/g, ' ');
  tooltip.innerHTML = `<div class="tt-title">${escHtml(name)}</div>${escHtml(node.description || '')}`;
  tooltip.style.opacity = 1;
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}

function hideTip() { tooltip.style.opacity = 0; }

// Zoom / Pan
function zoomIn() { zoom = Math.min(zoom * 1.25, 4); render(); }
function zoomOut() { zoom = Math.max(zoom / 1.25, 0.3); render(); }
function resetView() { zoom = 1; panX = 0; panY = 0; render(); }
function toggleLabels() { showLabels = !showLabels; render(); }

function expandAll() {
  function expand(n) { n.collapsed = false; if (n._children) n._children.forEach(expand); }
  expand(data);
  render();
}
function collapseAll() {
  function collapse(n, depth) {
    if (depth > 1) n.collapsed = true;
    if (n._children) n._children.forEach(c => collapse(c, depth + 1));
  }
  collapse(data, 0);
  render();
}

// Mouse pan
let dragging = false, dragStartX, dragStartY, panStartX, panStartY;
svg.addEventListener('mousedown', e => {
  if (e.target.closest('.node-group')) return;
  dragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  render();
});
window.addEventListener('mouseup', () => { dragging = false; });

// Scroll zoom
svg.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.deltaY < 0) zoom = Math.min(zoom * 1.08, 4);
  else zoom = Math.max(zoom / 1.08, 0.3);
  render();
}, { passive: false });

// ─── Initial state: depth 0 & 1 expanded ───────────────────────
function initCollapse(node, depth) {
  node.collapsed = depth >= 2;
  if (node._children) node._children.forEach(c => initCollapse(c, depth + 1));
}

// children → _children on load
function prepareData(node) {
  node._children = node.children || null;
  delete node.children;
  node.collapsed = false;
  if (node._children) node._children.forEach(prepareData);
}

prepareData(data);
initCollapse(data, 0);
render();

// Resize
window.addEventListener('resize', () => { render(); });
</script>
