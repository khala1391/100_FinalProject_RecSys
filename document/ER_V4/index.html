<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature used in each model</title>
  <link rel="stylesheet" href="er-style.css" />
</head>
<body>

<header>
  <h1>Feature used in each model</h1>
  <div id="active-model-label">Model: <span>None selected</span></div>
  <button id="model-btn" onclick="toggleDropdown()">🔍 Select Model</button>
</header>

<div class="legend-bar">
  <span>● Field used in any model</span>
  <span style="color:#94a3b8;">● Field not used (faded)</span>
  <span style="color:#92400e; font-weight:700;">● Active field in selected model</span>
  <span>🔑 Primary Key &nbsp; 🔗 Foreign Key</span>
  <span style="background:#d97706;color:#fff;padding:1px 6px;border-radius:3px;font-size:0.65rem;">fact</span>
  <span style="background:#64748b;color:#fff;padding:1px 6px;border-radius:3px;font-size:0.65rem;">dim</span>
  <span style="color:#64748b;font-style:italic;">Hover a table to expand · Click outside to close</span>
</div>

<!-- Model Summary Bar -->
<div id="model-summary">
  <div class="summary-label">Fields used in selected model:</div>
  <div id="model-fields-list"></div>
</div>

<div id="model-dropdown">
  <!-- Populated by JS -->
</div>

<div id="er-canvas">
  <div class="er-layout">
    <!-- Tables injected by JS -->
  </div>
</div>

<!-- Reusable Popup for expanded table view -->
<div id="er-popup" class="er-popup"></div>

<!-- Sample data tooltip -->
<div id="tooltip"></div>

<script src="er-diagram.js"></script>
<script>
// Extend selectModel to show summary bar
const _origSelect = selectModel;
window.selectModel = function(id) {
  _origSelect(id);
  const bar = document.getElementById('model-summary');
  const list = document.getElementById('model-fields-list');
  list.innerHTML = '';
  if (id) {
    bar.style.display = 'block';
    const m = MODELS.find(x => x.id === id);
    Object.entries(m.fields).forEach(([tbl, fields]) => {
      fields.forEach(f => {
        const chip = document.createElement('span');
        chip.style.cssText = 'background:#fef3c7;color:#92400e;padding:2px 9px;border-radius:14px;font-size:0.72rem;font-weight:600;cursor:default;';
        chip.title = 'Table: ' + tbl;
        chip.textContent = tbl + '.' + f;
        list.appendChild(chip);
      });
    });
  } else {
    bar.style.display = 'none';
  }
};
</script>

</body>
</html>
