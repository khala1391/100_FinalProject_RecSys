<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature used in each model</title>
  <link rel="stylesheet" href="er-style.css" />
</head>
<body>

<header>
  <h1>Feature used in each model</h1>
  <div id="active-model-label">Model: <span>None selected</span></div>
  <button id="model-btn" onclick="toggleDropdown()">🔍 Select Model</button>
</header>

<div id="model-dropdown"><!-- Populated by JS --></div>

<div id="legend-bar">
  <span>● Used in a model</span>
  <span style="color:#94a3b8;">● Not used (faded)</span>
  <span style="color:#92400e; font-weight:700;">● Active in selected model</span>
  <span>🔑 PK &nbsp; 🔗 FK</span>
  <span style="background:#d97706;color:#fff;padding:1px 5px;border-radius:3px;">fact</span>
  <span style="background:#64748b;color:#fff;padding:1px 5px;border-radius:3px;">dim</span>
  <span style="color:#94a3b8;font-style:italic;">Hover table → expand · Click outside → close</span>
</div>

<div id="model-summary">
  <div class="summary-lbl">Fields in selected model:</div>
  <div id="model-fields-list"></div>
</div>

<div id="er-canvas">
  <div class="er-layout"><!-- Cards injected by JS --></div>
</div>

<!-- Expanded popup -->
<div id="er-popup"></div>

<!-- Sample-data tooltip -->
<div id="tooltip"></div>

<script src="er-diagram.js"></script>
<script>
const _origSelect = selectModel;
window.selectModel = function(id) {
  _origSelect(id);
  const bar = document.getElementById('model-summary');
  const list = document.getElementById('model-fields-list');
  list.innerHTML = '';
  if (id) {
    bar.style.display = 'block';
    const m = MODELS.find(x => x.id === id);
    Object.entries(m.fields).forEach(([tbl, fields]) => {
      fields.forEach(f => {
        const chip = document.createElement('span');
        chip.style.cssText = 'background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:12px;font-size:0.68rem;font-weight:600;';
        chip.title = 'Table: ' + tbl;
        chip.textContent = tbl + '.' + f;
        list.appendChild(chip);
      });
    });
  } else {
    bar.style.display = 'none';
  }
};
</script>

</body>
</html>
