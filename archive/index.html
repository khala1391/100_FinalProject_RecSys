<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greed Route — เส้นทางนักอ่าน</title>
<style>
:root {
  --cream: #F2EAE0;
  --teal: #B4D3D9;
  --lilac: #BDA6CE;
  --purple: #9B8EC7;
  --text: #2d2840;
  --text-light: #6b6280;
  --bg: #F2EAE0;
  --card-bg: #fff;
  --card-shadow: rgba(155,142,199,0.13);
  --header-bg: #9B8EC7;
  --header-text: #fff;
  --modal-overlay: rgba(45,40,64,0.55);
  --star: #f5b731;
  --promoted-bg: linear-gradient(135deg,#BDA6CE22,#9B8EC722);
  --badge-promoted: #9B8EC7;
  --badge-new: #4caf86;
  --badge-popular: #e8793a;
  --btn-primary: #9B8EC7;
  --btn-primary-hover: #7c6eb5;
  --scrollbar-thumb: #BDA6CE;
  --scrollbar-track: #F2EAE0;
  --footer-bg: #2d2840;
  --footer-text: #d4cfe6;
}
[data-theme="dark"] {
  --cream: #1e1a2e;
  --teal: #2c3e44;
  --lilac: #3d2e50;
  --bg: #1e1a2e;
  --card-bg: #2a2542;
  --card-shadow: rgba(0,0,0,0.3);
  --text: #e8e2f0;
  --text-light: #a99ec0;
  --header-bg: #2a2542;
  --modal-overlay: rgba(10,8,20,0.75);
  --promoted-bg: linear-gradient(135deg,#3d2e5044,#2a254244);
  --scrollbar-thumb: #5a4e80;
  --scrollbar-track: #1e1a2e;
  --footer-bg: #141020;
  --footer-text: #a99ec0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:var(--bg);color:var(--text);
  line-height:1.5;transition:background .3s,color .3s;
  min-height:100vh;
}
/* === HEADER === */
.header{
  background:var(--header-bg);color:var(--header-text);
  padding:12px 16px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(155,142,199,0.25);
}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit}
.logo-icon{font-size:28px}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo-sub{font-size:10px;opacity:.8;display:block;font-weight:400;letter-spacing:0.5px}
.header-actions{display:flex;align-items:center;gap:8px}
.theme-toggle{
  background:none;border:2px solid rgba(255,255,255,0.4);
  color:inherit;border-radius:50%;width:36px;height:36px;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s;
}
.theme-toggle:hover{border-color:#fff}
.search-row{margin-top:10px;position:relative}
.search-input{
  width:100%;padding:10px 40px 10px 14px;border:none;
  border-radius:24px;font-size:15px;
  background:rgba(255,255,255,0.2);color:var(--header-text);
  outline:none;transition:background .2s;
}
.search-input::placeholder{color:rgba(255,255,255,0.6)}
.search-input:focus{background:rgba(255,255,255,0.3)}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.7}
/* === CATEGORY NAV === */
.cat-nav{
  display:flex;gap:8px;padding:12px 16px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  background:var(--bg);border-bottom:1px solid rgba(155,142,199,0.12);
}
.cat-nav::-webkit-scrollbar{display:none}
.cat-chip{
  flex-shrink:0;padding:6px 16px;border-radius:20px;
  border:1.5px solid var(--purple);color:var(--purple);
  background:transparent;font-size:13px;cursor:pointer;
  white-space:nowrap;transition:all .2s;font-weight:500;
}
.cat-chip.active,.cat-chip:hover{background:var(--purple);color:#fff}
/* === SECTIONS === */
.section{padding:20px 0}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px 12px;
}
.section-title{font-size:18px;font-weight:700;color:var(--text)}
.section-badge{
  font-size:11px;padding:3px 10px;border-radius:12px;
  color:#fff;font-weight:600;
}
.badge-promoted{background:var(--badge-promoted)}
.badge-new{background:var(--badge-new)}
.badge-popular{background:var(--badge-popular)}
.see-all{
  font-size:13px;color:var(--purple);text-decoration:none;
  font-weight:600;cursor:pointer;
}
.see-all:hover{text-decoration:underline}
.promoted-section{
  background:var(--promoted-bg);
  border-top:2px solid rgba(155,142,199,0.18);
  border-bottom:2px solid rgba(155,142,199,0.18);
}
/* === CAROUSEL === */
.carousel{
  display:flex;gap:14px;padding:0 16px 4px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;scrollbar-width:thin;
  scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track);
}
.carousel::-webkit-scrollbar{height:4px}
.carousel::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
.carousel::-webkit-scrollbar-track{background:var(--scrollbar-track)}
/* === BOOK CARD === */
.book-card{
  flex-shrink:0;width:160px;scroll-snap-align:start;
  background:var(--card-bg);border-radius:14px;
  box-shadow:0 2px 12px var(--card-shadow);
  overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;
  position:relative;
}
.book-card:hover{transform:translateY(-4px);box-shadow:0 6px 20px var(--card-shadow)}
.book-card .cover{
  width:100%;aspect-ratio:3/4;object-fit:cover;
  background:var(--teal);display:flex;align-items:center;justify-content:center;
  font-size:40px;color:var(--purple);
}
.book-card .cover img{width:100%;height:100%;object-fit:cover}
.book-card .info{padding:10px}
.book-card .title{font-size:13px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-card .author{font-size:11px;color:var(--text-light);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-card .meta-row{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.book-card .stars{font-size:11px;color:var(--star)}
.book-card .rating-num{font-size:11px;color:var(--text-light)}
.book-card .tag{font-size:9px;padding:2px 6px;border-radius:8px;background:var(--lilac);color:#fff;font-weight:600}
.book-card .card-actions{display:flex;gap:4px;padding:6px 10px 10px;flex-wrap:wrap}
.card-btn{
  flex:1;min-width:0;padding:5px 4px;border:none;border-radius:8px;
  font-size:10px;cursor:pointer;transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:2px;
  font-weight:600;
}
.btn-feedback{background:var(--teal);color:var(--text)}
.btn-reviews{background:var(--lilac);color:#fff}
.btn-add{background:var(--purple);color:#fff;flex:1 0 100%;margin-top:2px}
.card-btn:hover{opacity:.85}
.promoted-badge{
  position:absolute;top:8px;right:8px;background:var(--badge-promoted);
  color:#fff;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:700;
  z-index:2;
}
/* === GRID VIEW (for search results / filter) === */
.grid-view{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;padding:0 16px 20px;
}
.grid-view .book-card{width:auto}
/* === MODAL === */
.modal-overlay{
  position:fixed;inset:0;background:var(--modal-overlay);z-index:200;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--card-bg);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  padding:0;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{position:relative;padding:0}
.modal-cover{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:20px 20px 0 0}
.modal-close{
  position:absolute;top:12px;right:12px;width:36px;height:36px;
  border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;border:none;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-body{padding:20px}
.modal-title{font-size:20px;font-weight:800}
.modal-author{font-size:14px;color:var(--text-light);margin-top:2px}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.modal-meta .tag{font-size:11px;padding:3px 10px;border-radius:10px;background:var(--lilac);color:#fff;font-weight:600}
.modal-meta .stars{font-size:15px;color:var(--star)}
.modal-synopsis{margin-top:14px;font-size:14px;line-height:1.7;color:var(--text-light)}
.modal-publisher{margin-top:8px;font-size:12px;color:var(--text-light)}
.modal-section-title{font-size:16px;font-weight:700;margin-top:20px;margin-bottom:10px}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.modal-btn{
  flex:1;padding:12px;border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.modal-btn:hover{opacity:.85}
.modal-btn-primary{background:var(--purple);color:#fff}
.modal-btn-secondary{background:var(--teal);color:var(--text)}
.related-carousel{margin-top:10px}
/* === FILTER BAR === */
.filter-bar{
  display:flex;gap:8px;padding:10px 16px;flex-wrap:wrap;
  align-items:center;
}
.filter-select{
  padding:7px 12px;border-radius:12px;border:1.5px solid var(--purple);
  background:var(--card-bg);color:var(--text);font-size:13px;
  cursor:pointer;outline:none;
}
.filter-select:focus{border-color:var(--btn-primary)}
/* === NO RESULTS === */
.no-results{text-align:center;padding:40px 16px;color:var(--text-light);font-size:15px}
.no-results .emoji{font-size:40px;margin-bottom:10px;display:block}
/* === FOOTER === */
.footer{
  background:var(--footer-bg);color:var(--footer-text);
  padding:30px 16px;margin-top:20px;
}
.footer-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.footer h4{color:#fff;font-size:14px;margin-bottom:10px}
.footer a{color:var(--footer-text);text-decoration:none;font-size:12px;display:block;margin-bottom:6px}
.footer a:hover{color:#fff}
.footer-bottom{text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1);font-size:11px;opacity:.7}
/* === TOAST === */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--purple);color:#fff;padding:10px 24px;
  border-radius:24px;font-size:13px;font-weight:600;
  z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;
  box-shadow:0 4px 16px rgba(155,142,199,0.4);
}
.toast.show{opacity:1}
/* === RESPONSIVE === */
@media(min-width:640px){
  .book-card{width:180px}
  .grid-view{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .modal{border-radius:20px;margin:auto;max-height:85vh}
  .modal-overlay.open{align-items:center}
  .modal-cover{border-radius:20px 20px 0 0}
}
@media(min-width:960px){
  .header-inner{max-width:960px;margin:0 auto}
  .section-inner{max-width:960px;margin:0 auto}
  .footer-grid{grid-template-columns:1fr 1fr 1fr 1fr}
}
</style>
</head>

// =================== STATE ===================
let readingList = JSON.parse(localStorage.getItem('greedroute_reading') || '[]');
let userFeedback = JSON.parse(localStorage.getItem('greedroute_feedback') || '{}');
let clickCounts = JSON.parse(localStorage.getItem('greedroute_clicks') || '{}');
let activeCategory = 'ทั้งหมด';
let searchQuery = '';

function saveState(){
  localStorage.setItem('greedroute_reading', JSON.stringify(readingList));
  localStorage.setItem('greedroute_feedback', JSON.stringify(userFeedback));
  localStorage.setItem('greedroute_clicks', JSON.stringify(clickCounts));
}

// =================== RECOMMENDATION ENGINE ===================
function getRecommendedBooks(){
  const scored = BOOKS.map(b => {
    let score = b.popularity || 50;
    if(clickCounts[b.id]) score += clickCounts[b.id] * 5;
    if(userFeedback[b.id] === 'like') score += 20;
    if(userFeedback[b.id] === 'dislike') score -= 30;
    if(b.isNew) score += 10;
    if(b.promoted) score += 15;
    if(readingList.includes(b.id)) score += 8;
    // category affinity
    const likedCats = Object.keys(userFeedback).filter(k=>userFeedback[k]==='like').map(k=>{const bk=BOOKS.find(x=>x.id==k);return bk?bk.category:null}).filter(Boolean);
    if(likedCats.includes(b.category)) score += 12;
    return {...b, score};
  });
  scored.sort((a,b) => b.score - a.score);
  return scored;
}
function getPopularBooks(){return [...BOOKS].sort((a,b)=>(b.popularity||0)-(a.popularity||0));}
function getNewBooks(){return BOOKS.filter(b=>b.isNew);}
function getPromotedBooks(){return BOOKS.filter(b=>b.promoted);}
function getBooksByCategory(cat){return BOOKS.filter(b=>b.category===cat);}

// =================== RENDER HELPERS ===================
function starsHTML(rating){
  let s = '';
  for(let i=1;i<=5;i++){
    if(rating>=i) s+='★';
    else if(rating>=i-0.5) s+='★';
    else s+='☆';
  }
  return s;
}

function coverHTML(book){
  const h = hue(book.title);
  const bg = `hsl(${h},35%,82%)`;
  return `<div class="cover" style="background:${bg};display:flex;align-items:center;justify-content:center;font-size:36px">📖</div>`;
}

function bookCardHTML(book, showPromoted){
  const inList = readingList.includes(book.id);
  const fb = userFeedback[book.id] || '';
  return `
  <div class="book-card" onclick="openBook(${book.id})">
    ${(showPromoted && book.promoted)?'<span class="promoted-badge">โปรโมท</span>':''}
    ${coverHTML(book)}
    <div class="info">
      <div class="title">${esc(book.title)}</div>
      <div class="author">${esc(book.author)}</div>
      <div class="meta-row">
        <span class="stars">${starsHTML(book.rating)}</span>
        <span class="rating-num">${book.rating}</span>
      </div>
      <div class="meta-row">
        <span class="tag">${esc(book.tags[0]||book.category)}</span>
      </div>
    </div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="card-btn btn-reviews" onclick="openBook(${book.id})" title="อ่านรีวิว">💬</button>
      <button class="card-btn btn-feedback" onclick="toggleFeedback(${book.id},event)" title="ให้คะแนน">${fb==='like'?'👍':'fb'==='dislike'?'👎':'⭐'}</button>
      <button class="card-btn btn-add" onclick="toggleReading(${book.id},event)">${inList?'✅ ในรายการแล้ว':'📚 เพิ่มในรายการอ่าน'}</button>
    </div>
  </div>`;
}

function sectionHTML(title, books, badgeClass, badgeText, showPromoted){
  if(!books.length) return '';
  return `
  <section class="section ${badgeClass==='badge-promoted'?'promoted-section':''}">
    <div class="section-header">
      <div>
        <span class="section-title">${esc(title)}</span>
        ${badgeText?`<span class="section-badge ${badgeClass}">${badgeText}</span>`:''}
      </div>
    </div>
    <div class="carousel">${books.map(b=>bookCardHTML(b,showPromoted)).join('')}</div>
  </section>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// =================== RENDER ===================
function renderMain(){
  const main = document.getElementById('mainContent');
  const recommended = getRecommendedBooks().slice(0,15);
  const popular = getPopularBooks().slice(0,12);
  const newBooks = getNewBooks();
  const promoted = getPromotedBooks();

  let html = '';
  html += sectionHTML('📢 หนังสือแนะนำจากผู้สนับสนุน', promoted, 'badge-promoted', 'Sponsored', true);
  html += sectionHTML('✨ แนะนำสำหรับคุณ', recommended, '', '', false);
  html += sectionHTML('🔥 ยอดนิยม', popular, 'badge-popular', 'Popular', false);
  html += sectionHTML('🆕 มาใหม่', newBooks, 'badge-new', 'New', false);

  CATEGORIES.forEach(cat => {
    const books = getBooksByCategory(cat);
    html += sectionHTML(cat, books, '', '', false);
  });

  main.innerHTML = html;
}

function renderCatNav(){
  const nav = document.getElementById('catNav');
  const cats = ['ทั้งหมด', ...CATEGORIES];
  nav.innerHTML = cats.map(c => `<button class="cat-chip ${activeCategory===c?'active':''}" onclick="selectCategory('${esc(c)}')">${esc(c)}</button>`).join('');
}

function renderFooter(){
  const grid = document.getElementById('footerCats');
  const half = Math.ceil(CATEGORIES.length/2);
  const col1 = CATEGORIES.slice(0, half);
  const col2 = CATEGORIES.slice(half);
  grid.innerHTML = `
    <div><h4>หมวดหมู่</h4>${col1.map(c=>`<a href="#" onclick="selectCategory('${esc(c)}');return false">${esc(c)}</a>`).join('')}</div>
    <div><h4>&nbsp;</h4>${col2.map(c=>`<a href="#" onclick="selectCategory('${esc(c)}');return false">${esc(c)}</a>`).join('')}</div>
    <div><h4>Greed Route</h4><a href="#">เกี่ยวกับเรา</a><a href="#">ติดต่อ</a><a href="#">นโยบายความเป็นส่วนตัว</a><a href="#">เงื่อนไขการใช้งาน</a></div>
    <div><h4>ติดตามเรา</h4><a href="#">Facebook</a><a href="#">Instagram</a><a href="#">Twitter / X</a></div>
  `;
}

// =================== SEARCH & FILTER ===================
function handleSearch(){
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  if(!searchQuery){
    document.getElementById('mainContent').style.display = '';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('filterBar').style.display = 'none';
    return;
  }
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('searchResults').style.display = '';
  document.getElementById('filterBar').style.display = 'flex';
  applyFilters();
}

function applyFilters(){
  const sort = document.getElementById('sortSelect').value;
  const minRating = parseFloat(document.getElementById('ratingFilter').value);
  let results = BOOKS.filter(b=>{
    const q = searchQuery;
    const match = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || b.category.toLowerCase().includes(q) || b.tags.some(t=>t.toLowerCase().includes(q));
    const catMatch = activeCategory==='ทั้งหมด' || b.category===activeCategory;
    const ratingMatch = b.rating >= minRating;
    return match && catMatch && ratingMatch;
  });

  if(sort==='popular') results.sort((a,b)=>(b.popularity||0)-(a.popularity||0));
  else if(sort==='newest') results.sort((a,b)=>(b.isNew?1:0)-(a.isNew?1:0));
  else if(sort==='rating') results.sort((a,b)=>b.rating-a.rating);
  else results = getRecommendedBooks().filter(b=>results.find(r=>r.id===b.id));

  const container = document.getElementById('searchResults');
  if(!results.length){
    container.innerHTML = `<div class="no-results"><span class="emoji">📭</span>ไม่พบหนังสือที่ตรงกับการค้นหา</div>`;
  } else {
    container.innerHTML = `<div class="section"><div class="section-header"><span class="section-title">ผลการค้นหา (${results.length} เล่ม)</span></div><div class="grid-view">${results.map(b=>bookCardHTML(b,true)).join('')}</div></div>`;
  }
}

function selectCategory(cat){
  activeCategory = cat;
  renderCatNav();
  if(cat === 'ทั้งหมด' && !searchQuery){
    document.getElementById('mainContent').style.display = '';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('filterBar').style.display = 'none';
  } else {
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('searchResults').style.display = '';
    document.getElementById('filterBar').style.display = 'flex';
    applyFilters();
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll(){
  activeCategory='ทั้งหมด';
  searchQuery='';
  document.getElementById('searchInput').value='';
  document.getElementById('mainContent').style.display='';
  document.getElementById('searchResults').style.display='none';
  document.getElementById('filterBar').style.display='none';
  renderCatNav();
  renderMain();
  window.scrollTo({top:0,behavior:'smooth'});
}

// =================== BOOK DETAIL MODAL ===================
function openBook(id){
  clickCounts[id] = (clickCounts[id]||0) + 1;
  saveState();
  const book = BOOKS.find(b=>b.id===id);
  if(!book) return;
  const fb = userFeedback[id] || '';
  const inList = readingList.includes(id);
  const related = BOOKS.filter(b=>b.category===book.category && b.id!==id).slice(0,6);
  const h = hue(book.title);
  const bg = `hsl(${h},35%,82%)`;

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-cover" style="background:${bg};display:flex;align-items:center;justify-content:center;font-size:80px">📖</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-title">${esc(book.title)}</div>
      <div class="modal-author">โดย ${esc(book.author)}</div>
      <div class="modal-publisher">สำนักพิมพ์: ${esc(book.publisher)}</div>
      <div class="modal-meta">
        <span class="stars">${starsHTML(book.rating)}</span>
        <span>${book.rating} / 5</span>
        ${book.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
        <span class="tag">${esc(book.category)}</span>
      </div>
      <p class="modal-synopsis">${esc(book.synopsis)}</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-primary" onclick="toggleReading(${book.id})">
          ${inList?'✅ อยู่ในรายการอ่านแล้ว':'📚 เพิ่มในรายการอ่าน'}
        </button>
        <button class="modal-btn modal-btn-secondary" onclick="toggleFeedback(${book.id})">
          ${fb==='like'?'👍 คุณชอบเล่มนี้':'⭐ ให้คะแนนเล่มนี้'}
        </button>
      </div>
      ${related.length ? `
        <div class="modal-section-title">📚 หนังสือที่เกี่ยวข้อง</div>
        <div class="carousel related-carousel">${related.map(b=>bookCardHTML(b,false)).join('')}</div>
      ` : ''}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  renderMain();
}

// =================== ACTIONS ===================
function toggleReading(id, e){
  if(e) e.stopPropagation();
  const idx = readingList.indexOf(id);
  if(idx>-1){readingList.splice(idx,1);showToast('นำออกจากรายการอ่านแล้ว');}
  else{readingList.push(id);showToast('เพิ่มในรายการอ่านแล้ว ✅');}
  saveState();
  renderMain();
}

function toggleFeedback(id, e){
  if(e) e.stopPropagation();
  const current = userFeedback[id];
  if(current === 'like'){userFeedback[id]='dislike';showToast('บันทึกแล้ว: ไม่ชอบ 👎');}
  else if(current === 'dislike'){delete userFeedback[id];showToast('ล้างคะแนนแล้ว');}
  else{userFeedback[id]='like';showToast('บันทึกแล้ว: ชอบ 👍');}
  saveState();
  renderMain();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// =================== THEME ===================
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', isDark?'':'dark');
  document.querySelector('.theme-toggle').textContent = isDark?'🌙':'☀️';
  localStorage.setItem('greedroute_theme', isDark?'':'dark');
}
(function initTheme(){
  const saved = localStorage.getItem('greedroute_theme');
  if(saved==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.querySelector('.theme-toggle').textContent='☀️';
  }
})();

// =================== INIT ===================
renderCatNav();
renderMain();
renderFooter();
</script>
