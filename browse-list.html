<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greed Route — รายการหนังสือ</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="browse-list">

<main class="container">
  <div class="page-layout no-left">
    <div class="main-content">
      <div class="section-header">
        <h2 data-th="📋 รายการหนังสือ (Listopia)" data-en="📋 Lists (Listopia)">📋 รายการหนังสือ (Listopia)</h2>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
        <button class="btn btn-primary btn-sm" data-th="นิยาย" data-en="Fiction">นิยาย</button>
        <button class="btn btn-secondary btn-sm" data-th="สารคดี" data-en="Non-Fiction">สารคดี</button>
        <button class="btn btn-secondary btn-sm" data-th="โรแมนซ์" data-en="Romance">โรแมนซ์</button>
        <button class="btn btn-secondary btn-sm" data-th="สืบสวน" data-en="Mystery">สืบสวน</button>
        <button class="btn btn-secondary btn-sm" data-th="แฟนตาซี" data-en="Fantasy">แฟนตาซี</button>
        <button class="btn btn-secondary btn-sm" data-th="วิทยาศาสตร์" data-en="Sci-Fi">วิทยาศาสตร์</button>
      </div>
      <div id="listGrid"></div>
    </div>
    <aside class="sidebar">
      <h3 data-th="⚡ ลิงก์ด่วน" data-en="⚡ Quick Links">⚡ ลิงก์ด่วน</h3>
      <ul class="sidebar-nav">
        <li><a href="#" data-th="สร้างรายการใหม่" data-en="Create New List">📝 สร้างรายการใหม่</a></li>
        <li><a href="#" data-th="รายการที่ฉันสร้าง" data-en="Lists I Created">📋 รายการที่ฉันสร้าง</a></li>
        <li><a href="#" data-th="รายการที่โหวต" data-en="Lists I Voted On">🗳️ รายการที่โหวต</a></li>
        <li><a href="#" data-th="รายการที่ถูกใจ" data-en="Lists I Liked">❤️ รายการที่ถูกใจ</a></li>
      </ul>
    </aside>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
window.onDataReady = function() {
  initComponents();
  populateGenreModal();
  const listGrid = document.getElementById('listGrid');
  if (!listGrid) return;
  const lists = [
    {name_th:'100 หนังสือที่ต้องอ่านก่อนตาย', name_en:'100 Books to Read Before You Die', count:2450, votes:15600},
    {name_th:'นิยายไทยที่ดีที่สุด', name_en:'Best Thai Novels', count:180, votes:8900},
    {name_th:'หนังสือ Self-Help ที่เปลี่ยนชีวิต', name_en:'Life-Changing Self-Help Books', count:320, votes:12300},
    {name_th:'แฟนตาซียอดเยี่ยม', name_en:'All-Time Best Fantasy', count:560, votes:23100}
  ];
  listGrid.innerHTML = '<div class="book-grid grid-4" style="gap:16px">' + lists.map(l => `
    <div class="card"><div class="card-body">
      <h4 class="card-title">${t(l,'name')}</h4>
      <div class="card-subtitle">${l.count} ${lang==='th'?'เล่ม':'books'} · ${(l.votes/1000).toFixed(1)}k ${lang==='th'?'โหวต':'votes'}</div>
      <button class="btn btn-outline btn-sm" style="margin-top:8px">${lang==='th'?'ดูรายการ':'View List'}</button>
    </div></div>`).join('') + '</div>';
};
</script>
</body>
</html>
