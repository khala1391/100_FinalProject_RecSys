<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greed Route — Choice Awards</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="browse-choice">

<main class="container">
  <div class="page-layout left-only">
    <aside class="sidebar">
      <h3 data-th="🗓️ กำหนดการโหวต" data-en="🗓️ Voting Schedule">🗓️ กำหนดการโหวต</h3>
      <p style="font-size:.8rem;color:var(--text-secondary);line-height:1.5">รอบแรก: 1-15 พ.ย. 2569<br>รอบสุดท้าย: 20-30 พ.ย. 2569<br>ประกาศผล: 10 ธ.ค. 2569</p>
      <hr style="margin:16px 0;border:none;border-top:1px solid var(--border)">
      <h3 data-th="📅 ปีย้อนหลัง" data-en="📅 Past Years">📅 ปีย้อนหลัง</h3>
      <ul class="sidebar-nav">
        <li><a href="#">2025</a></li><li><a href="#">2024</a></li><li><a href="#">2023</a></li><li><a href="#">2022</a></li>
      </ul>
    </aside>
    <div class="main-content">
      <div class="awards-banner">
        <h1 data-th="🏆 Greed Route Choice Awards 2026" data-en="🏆 Greed Route Choice Awards 2026">🏆 Greed Route Choice Awards 2026</h1>
        <p data-th="โหวตหนังสือที่ดีที่สุดแห่งปี!" data-en="Vote for the best books of the year!">โหวตหนังสือที่ดีที่สุดแห่งปี!</p>
        <div class="awards-stats">
          <div class="stat"><div class="stat-num">2.4M</div><div class="stat-label" data-th="โหวตรวม" data-en="Total Votes">โหวตรวม</div></div>
          <div class="stat"><div class="stat-num">20</div><div class="stat-label" data-th="หมวดหมู่" data-en="Categories">หมวดหมู่</div></div>
          <div class="stat"><div class="stat-num">200</div><div class="stat-label" data-th="หนังสือ" data-en="Books">หนังสือ</div></div>
        </div>
      </div>
      <div id="choiceAwardsGrid"></div>
    </div>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
window.onDataReady = function() {
  initComponents();
  populateGenreModal();
  const choiceGrid = document.getElementById('choiceAwardsGrid');
  if (!choiceGrid || !books.length) return;
  let html = '';
  genres.slice(0,8).forEach(g => {
    const gBooks = books.filter(b => b.genre === g.id).slice(0,1);
    const book = gBooks[0] || books[Math.floor(Math.random()*books.length)];
    const gName = lang==='en' ? g.en : g.th;
    html += `<div class="genre-section"><div class="genre-title">🏆 ${gName}</div><div class="book-grid">${bookCardHTML(book)}</div></div>`;
  });
  choiceGrid.innerHTML = html;
};
</script>
</body>
</html>
